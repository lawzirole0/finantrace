{% extends 'landing/index.html' %}
{% block standalone %}
<div class="min-h-screen bg-[#faf8ff] flex items-center justify-center">
    <div class="w-full max-w-md mx-4 text-center">
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-[#c3c5d9]/30">
            <div class="w-16 h-16 bg-[#006e2f]/10 rounded-full flex items-center justify-center text-[#006e2f] mx-auto mb-4">
                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Password reset complete</h2>
            <p class="text-[#434656] mb-8">Your password has been set. You can now log in with your new password.</p>
            <a href="{% url 'login' %}" class="inline-block px-8 py-3 bg-[#0043ce] text-white rounded-xl font-bold hover:bg-[#1e5af9] transition-all shadow-md">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
