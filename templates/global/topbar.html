<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-[#faf8ff]/80 backdrop-blur-md z-40 flex items-center justify-between px-[40px] shadow-sm border-b border-[#c3c5d9]/10">
    <div class="flex items-center gap-4 w-1/3">
        <div class="relative w-full">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#737687]">search</span>
            <input class="w-full h-10 pl-10 pr-4 bg-[#f2f3ff] border-none rounded-full text-sm focus:ring-2 focus:ring-[#0043ce]/20 transition-all" placeholder="Search analytics, invoices, or roadmap..." type="text"/>
        </div>
    </div>
    <div class="flex items-center gap-2">
        <button class="hover:bg-[#e2e7ff] rounded-full p-2 transition-all text-[#434656]">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <div class="h-8 w-[1px] bg-[#c3c5d9]/30 mx-2"></div>
        <a href="/reconciliation/" class="flex items-center gap-2 bg-[#0043ce] text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-[#1e5af9] transition-colors shadow-sm">
            <span class="material-symbols-outlined text-[18px]">sync</span>
            <span>Check Report</span>
        </a>
    </div>
</header>
